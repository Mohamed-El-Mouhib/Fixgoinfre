# goinfre Package Manager — packages.conf
#
# Format (one package per line, whitespace-separated):
#   PackageName   https://download.url/file.tar.gz   [optional post-install shell command]
#
# Post-install command tips:
#   - $PACKAGE_DIR  → resolves to ~/goinfre/bin/PackageName
#   - $GOINFRE_BIN  → resolves to ~/goinfre/bin
#   - Use it to symlink binaries, set permissions, etc.
#
# Lines starting with # are comments. Blank lines are ignored.
# ─────────────────────────────────────────────────────────────────────────────

# After extraction the script automatically finds and chmod +x's the binary:
#   1. ~/goinfre/bin/PackageName/<PackageName>        ← tried first  (e.g. zen/zen)
#   2. ~/goinfre/bin/PackageName/bin/<PackageName>    ← fallback     (e.g. nvim/bin/nvim)
# The post-install command column is only needed for extra steps beyond that.

nvim          https://github.com/neovim/neovim/releases/download/v0.12.1/nvim-linux-x86_64.tar.gz

Antigravity   https://edgedl.me.gvt1.com/edgedl/release2/j0qc3/antigravity/stable/1.23.2-4781536860569600/linux-x64/Antigravity.tar.gz

zen           https://github.com/zen-browser/desktop/releases/latest/download/zen.linux-x86_64.tar.xz

